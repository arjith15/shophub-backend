server.port=8080
spring.application.name=shophub-backend

# ── MySQL Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/shophub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Arjith@150429
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Disable Spring Security completely ────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ── JWT ────────────────────────────────────────────────────────
app.jwt.secret=ShopHub$Super$Secret$Key$2024$Arjith$Secure$JWT$Key$256Bits!
app.jwt.expiration=86400000

# ── CORS ───────────────────────────────────────────────────────
spring.web.cors.allowed-origins=http://localhost:5500,http://localhost:5501,http://127.0.0.1:5500,http://127.0.0.1:5501

# ── Jackson ────────────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ────────────────────────────────────────────────────
logging.level.com.shophub=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n